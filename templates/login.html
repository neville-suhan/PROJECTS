<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
}

.form-container{
    background: rgba(255,255,255,0.1);
    padding:40px;
    width:350px;
    border-radius:15px;
    backdrop-filter: blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    color:#fff;
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ffffff;
    color:#ff4e8a;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ddd;
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.link a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

.link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>
{% for m in get_flashed_messages() %}
<script>alert("{{m}}")</script>
{% endfor %}


<div class="form-container">
    <h2>Login</h2>

    <form method="post" action="/login">

        <div class="input-group">
            <label>Email</label>
            <input type="email" 
                   name="email" 
                   placeholder="user@gmail.com"
                   required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" 
                   name="password" 
                   placeholder="Enter your password"
                   required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
